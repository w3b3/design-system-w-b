<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0e0e;--bg2:#141414;--fg:#f3f1ec;
  --dim:rgba(243,241,236,0.35);--dimmer:rgba(243,241,236,0.15);
  --hair:rgba(243,241,236,0.08);
  --accent:#d4a853;--accent-dim:rgba(212,168,83,0.3);
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,monospace;
  --helv:Helvetica,"Helvetica Neue",Arial,sans-serif;
}
html{background:var(--bg);color:var(--fg);font-family:var(--helv)}
body{background:var(--bg);-webkit-font-smoothing:antialiased}
</style>
</head>
<body>
<div style="background:var(--bg);color:var(--fg);font-family:var(--helv)">
  <h1 style="font-size:clamp(42px,6vw,72px);font-weight:700;letter-spacing:-0.04em;color:var(--fg)">Pipeline Overview</h1>
  <p style="color:var(--dim);font-size:clamp(16px,1.6vw,19px);line-height:1.65;max-width:680px">Our data pipeline processes 10M events/day.</p>
  <div style="background:var(--bg2);padding:20px;border:1px solid var(--hair)">
    <span style="color:var(--accent);font-family:var(--mono);font-size:12px;letter-spacing:0.02em">Active</span><span style="color:var(--dim);font-family:var(--mono);font-size:12px;letter-spacing:0.02em"> — Processing</span>
  </div>
</div>
</body>
</html>
